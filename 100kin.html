<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平塚市 100均マップ</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
        .back-link { text-decoration: none; color: #3498db; font-weight: bold; }
        .shop-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin: 15px 0; background: #fff; }
        .brand { font-size: 1.2rem; font-weight: bold; color: #e67e22; }
        .map-btn { 
            display: inline-block; margin-top: 10px; padding: 8px 15px; 
            background: #3498db; color: white; text-decoration: none; border-radius: 5px; 
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← ホームへ戻る</a>
    <h1>平塚市内の100円ショップ</h1>

    <div class="shop-card">
        <div class="brand">DAISO（ダイソー）</div>
        <p>OSC湘南シティ店、ラスカ平塚店、平塚河内店 など</p>
        <a href="https://www.google.com/maps/search/ダイソー+平塚市" target="_blank" class="map-btn">マップで確認</a>
    </div>

    <div class="shop-card">
        <div class="brand">Seria（セリア）</div>
        <p>ららぽーと湘南平塚店、ユーユー本館店 など</p>
        <a href="https://www.google.com/maps/search/セリア+平塚市" target="_blank" class="map-btn">マップで確認</a>
    </div>

    <div class="shop-card">
        <div class="brand">Can★Do（キャンドゥ）</div>
        <p>平塚店、ヤオコー平塚店 など</p>
        <a href="https://www.google.com/maps/search/キャンドゥ+平塚市" target="_blank" class="map-btn">マップで確認</a>
    </div>

</body>
</html>
