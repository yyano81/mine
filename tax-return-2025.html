<!DOCTYPE html>

    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .summary { display: flex; gap: 20px; margin-bottom: 20px; }
        .summary-card { flex: 1; padding: 15px; border-radius: 5px; color: white; }
        .income { background: #28a745; }
        .expense { background: #dc3545; }
        .profit { background: #007bff; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8f9fa; cursor: pointer; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #f1f1f1; }
        .map-link { font-size: 0.8em; color: #007bff; text-decoration: none; }
    </style>
</head>

const tableBody = document.getElementById('tableBody');
data.forEach(item => {
    const row = `<tr>
        <td>${item.d}</td>
        <td>${item.t}</td>
        <td>${item.c}</td>
        <td>${item.v}<br><a class="map-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.v)}" target="_blank">📍Map</a></td>
        <td>${item.m}</td>
        <td>¥${item.a.toLocaleString()}</td>
        <td>${item.p}</td>
    </tr>`;
    tableBody.innerHTML += row;
});

function filterTable() {
    const input = document.getElementById('searchInput');
    const filter = input.value.toLowerCase();
    const rows = tableBody.getElementsByTagName('tr');
    for (let i = 0; i < rows.length; i++) {
        rows[i].style.display = rows[i].innerText.toLowerCase().includes(filter) ? "" : "none";
    }
}
